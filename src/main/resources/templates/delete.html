<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Delete user</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <style>
        .modal-custom-width {
            max-width: 480px;
            margin: 30px auto;
        }

        .form-container {
            max-width: 300px;
            margin: 0 auto;
        }

        .form-group label {
            margin-bottom: 2px;
        }
    </style>
</head>

<body class="bg-light">


<div class="modal-dialog modal-custom-width shadow-lg" role="document">

    <div class="modal-content">

        <div class="modal-header py-2">

            <h5 class="modal-title">
                Delete user
            </h5>

            <button type="button"
                    class="close"
                    onclick="window.location.href='/admin'">
                <span>&times;</span>
            </button>

        </div>


        <div class="modal-body">

            <div class="form-container text-center">

                <form th:action="@{/admin/delete}"
                      th:object="${user}"
                      method="post">


                    <input type="hidden" th:field="*{id}">


                    <div class="form-group">
                        <label class="font-weight-bold">
                            ID
                        </label>

                        <input class="form-control form-control-sm"
                               th:field="*{id}"
                               readonly>
                    </div>


                    <div class="form-group">
                        <label class="font-weight-bold">
                            First name
                        </label>

                        <input class="form-control form-control-sm"
                               th:field="*{username}"
                               disabled>
                    </div>


                    <div class="form-group">
                        <label class="font-weight-bold">
                            Last name
                        </label>

                        <input class="form-control form-control-sm"
                               value="---"
                               disabled>
                    </div>


                    <div class="form-group">
                        <label class="font-weight-bold">
                            Age
                        </label>

                        <input type="number"
                               class="form-control form-control-sm"
                               value="---"
                               disabled>
                    </div>


                    <div class="form-group">
                        <label class="font-weight-bold">
                            Email
                        </label>

                        <input class="form-control form-control-sm"
                               th:field="*{email}"
                               disabled>
                    </div>


                    <div class="form-group">

                        <label class="font-weight-bold">
                            Role
                        </label>

                        <select multiple
                                class="form-control form-control-sm"
                                size="2"
                                disabled>

                            <option th:each="role : ${user.roles}"
                                    th:text="${role.role}">
                            </option>

                        </select>

                    </div>


                    <div class="d-flex justify-content-end mt-4 border-top pt-2">

                        <a href="/admin"
                           class="btn btn-secondary btn-sm mr-2">
                            Close
                        </a>


                        <button type="submit"
                                class="btn btn-danger btn-sm">
                            Delete
                        </button>

                    </div>


                </form>

            </div>

        </div>

    </div>

</div>


</body>
</html>
