<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<!-- Верхняя панель -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">

        <span class="navbar-text text-white">
            <b sec:authentication="name"></b>

                <span sec:authorize="isAuthenticated()">
                with roles:
            <span sec:authentication="principal.authorities"></span>
        </span>

        <form th:action="@{/logout}" method="post" class="m-0">
            <button class="btn btn-link text-secondary text-decoration-none">
                Logout
            </button>
        </form>

    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- Левая панель -->
        <div class="col-2 bg-white border-end vh-100 p-0">

            <div class="list-group rounded-0">

                <a href="/admin"
                   class="list-group-item list-group-item-action active">
                    Admin
                </a>

                <a href="/user"
                   class="list-group-item list-group-item-action">
                    User
                </a>

            </div>

        </div>

        <!-- Основной контент -->
        <div class="col-10 p-4">

            <h1 class="display-5 fw-bold mb-4">Admin panel</h1>

            <ul class="nav nav-tabs">
                <li class="nav-item">
                    <a class="nav-link active" href="#">
                        Users table
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/admin/new}">
                        New User
                    </a>
                </li>
            </ul>

            <div class="card">

                <div class="card-header fs-4">
                    All users
                </div>

                <div class="card-body p-0">

                    <table class="table table-striped mb-0 align-middle">

                        <thead>

                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Roles</th>
                            <th>Edit</th>
                            <th>Delete</th>
                        </tr>

                        </thead>

                        <tbody>

                        <tr th:each="user : ${users}">

                            <td th:text="${user.id}"></td>

                            <td th:text="${user.username}"></td>

                            <td th:text="${user.email}"></td>

                            <td>
                                <span th:each="role : ${user.roles}"
                                      th:text="${role.role.replace('ROLE_','') + ' '}">
                                </span>
                            </td>

                            <td>
                                <a class="btn btn-info btn-sm text-white"
                                   th:href="@{/admin/edit/{id}(id=${user.id})}">
                                    Edit
                                </a>
                            </td>

                            <td>
                                <a class="btn btn-danger btn-sm"
                                   th:href="@{/admin/delete/{id}(id=${user.id})}">
                                    Delete
                                </a>
                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
