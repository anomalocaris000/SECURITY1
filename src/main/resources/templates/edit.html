<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Edit user</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <style>

        .modal-custom-width {
            max-width: 480px;
            margin: 30px auto;
        }


        .form-container {
            max-width: 300px;
            margin: 0 auto;
        }


        .form-group label {
            font-weight: bold;
            margin-bottom: 3px;
        }


    </style>

</head>


<body class="bg-light">



<div class="modal-dialog modal-custom-width shadow-lg">


    <div class="modal-content">



        <div class="modal-header py-2">


            <h5 class="modal-title">
                Edit user
            </h5>


            <a href="/admin"
               class="close">

                <span>
                    &times;
                </span>

            </a>


        </div>





        <div class="modal-body">


            <div class="form-container text-center">



                <form th:action="@{/admin/update}"
                      th:object="${user}"
                      method="post">



                    <!-- ID -->
                    <div class="form-group">


                        <label>
                            ID
                        </label>


                        <input type="text"
                               class="form-control form-control-sm"
                               th:field="*{id}"
                               readonly>


                    </div>





                    <!-- Username -->
                    <div class="form-group">


                        <label>
                            Username
                        </label>


                        <input type="text"
                               class="form-control form-control-sm"
                               th:field="*{username}"
                               required>


                    </div>






                    <!-- Email -->
                    <div class="form-group">


                        <label>
                            Email
                        </label>


                        <input type="email"
                               class="form-control form-control-sm"
                               th:field="*{email}"
                               required>


                    </div>







                    <!-- Password -->
                    <div class="form-group">


                        <label>
                            Password
                        </label>


                        <input type="password"
                               class="form-control form-control-sm"
                               th:field="*{password}"
                               placeholder="Enter new password">


                    </div>








                    <!-- Roles -->
                    <div class="form-group">


                        <label>
                            Role
                        </label>


                        <select multiple
                                size="2"
                                class="form-control form-control-sm"
                                th:field="*{roles}">


                            <option th:each="role : ${roles}"
                                    th:value="${role.id}"
                                    th:text="${role.role}">
                            </option>


                        </select>


                    </div>







                    <div class="d-flex justify-content-end mt-4 border-top pt-2">



                        <a href="/admin"
                           class="btn btn-secondary btn-sm mr-2">

                            Close

                        </a>





                        <button type="submit"
                                class="btn btn-primary btn-sm">

                            Edit

                        </button>




                    </div>




                </form>



            </div>



        </div>




    </div>



</div>






<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
