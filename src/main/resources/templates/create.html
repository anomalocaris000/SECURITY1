<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>New User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        .modal-custom-width {
            max-width: 480px;
            margin: 30px auto;
        }

        .form-container {
            max-width: 300px;
            margin: 0 auto;
        }

        label {
            font-weight: bold;
        }
    </style>

</head>

<body class="bg-light">


<div class="modal-dialog modal-custom-width shadow-lg">

    <div class="modal-content">


        <div class="modal-header py-2">

            <h5 class="modal-title">
                New user
            </h5>

            <a href="/admin"
               class="close">
                &times;
            </a>

        </div>


        <div class="modal-body">


            <div class="form-container text-center">


                <form th:action="@{/admin/save}"
                      th:object="${user}"
                      method="post">


                    <div class="form-group">

                        <label>
                            Username
                        </label>

                        <input type="text"
                               class="form-control form-control-sm"
                               th:field="*{username}"
                               required>

                    </div>



                    <div class="form-group">

                        <label>
                            Email
                        </label>

                        <input type="email"
                               class="form-control form-control-sm"
                               th:field="*{email}"
                               required>

                    </div>



                    <div class="form-group">

                        <label>
                            Password
                        </label>

                        <input type="password"
                               class="form-control form-control-sm"
                               th:field="*{password}"
                               required>

                    </div>



                    <div class="form-group">

                        <label>
                            Role
                        </label>


                        <select class="form-control form-control-sm"
                                multiple
                                size="2"
                                th:field="*{roles}"
                                required>


                            <option th:each="role : ${roles}"
                                    th:value="${role.id}"
                                    th:text="${role.role}">
                            </option>


                        </select>


                    </div>



                    <div class="d-flex justify-content-end mt-4 border-top pt-2">


                        <a href="/admin"
                           class="btn btn-secondary btn-sm mr-2">
                            Close
                        </a>


                        <button type="submit"
                                class="btn btn-success btn-sm">
                            Add user
                        </button>


                    </div>


                </form>


            </div>


        </div>


    </div>


</div>


</body>
</html>
