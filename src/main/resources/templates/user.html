<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>User page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        .sidebar {
            min-height: calc(100vh - 56px);
        }
    </style>
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-text text-white">

        <strong th:text="${user.email}">
            user@mail.ru
        </strong>

        with roles:

        <span th:each="role : ${user.roles}"
              th:text="${role.role.replace('ROLE_','') + ' '}">
            USER
        </span>

    </span>

    <form th:action="@{/logout}" method="post">
        <button class="btn btn-link text-secondary">
            Logout
        </button>
    </form>

</nav>


<div class="container-fluid">

    <div class="row">


        <div class="col-md-2 bg-white sidebar px-0 pt-3">

            <div class="list-group rounded-0">

                <a href="/user"
                   class="list-group-item list-group-item-action active">
                    User
                </a>

            </div>

        </div>


        <div class="col-md-10 px-4 pt-4">

            <h1 class="mb-4">
                User information-page
            </h1>


            <div class="card">

                <div class="card-header">
                    <strong>About user</strong>
                </div>


                <div class="card-body">


                    <table class="table table-striped mb-0">

                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Roles</th>
                        </tr>
                        </thead>


                        <tbody>

                        <tr>

                            <td th:text="${user.id}">
                                1
                            </td>

                            <td th:text="${user.username}">
                                user
                            </td>

                            <td th:text="${user.email}">
                                user@mail.ru
                            </td>


                            <td>

                                <span th:each="role : ${user.roles}"
                                      th:text="${role.role.replace('ROLE_','') + ' '}">
                                    USER
                                </span>

                            </td>

                        </tr>

                        </tbody>

                    </table>


                </div>

            </div>


        </div>


    </div>

</div>


<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
